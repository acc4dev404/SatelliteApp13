server:
  port: ${SERVER_PORT:9090}

spring:
  application:
    name: telemetry-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/satellite_db?currentSchema=telemetry_schema}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    schemas: telemetry_schema
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      enable-auto-commit: true
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        allow.auto.create.topics: true
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: satellite-event:ru.bmstu.telemetry.kafka.SatelliteEvent

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}

logging:
  level:
    ru.bmstu.telemetry: DEBUG
    io.grpc: INFO
    org.springframework.kafka: INFO